name: Build .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o cˇdigo
        uses: actions/checkout@v5

      - name: Configurar .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restaurar dependŕncias
        run: dotnet restore

      - name: Compilar projeto
        run: dotnet build --no-restore --configuration Release